<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your TryOn Mirror account is verified.">
  <title>Email Verified | TryOn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 440px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
      border: 1px solid #eee;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }
    .logo {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
      text-decoration: none;
      color: #111;
      display: inline-block;
    }
    .logo .face { color: #888; font-weight: 400; }
    .check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      line-height: 1;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .muted {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #999;
    }
    .muted a { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <a href="https://tryon-mirror.ai" class="logo">
      TryOn<span class="face"> Mirror</span>
    </a>
    <div class="check">&#10003;</div>
    <h1>Email verified</h1>
    <p>Your TryOn Mirror account is ready. Open the app on your phone to start trying on outfits.</p>
    <a href="tryon://verified" class="btn">Open the TryOn Mirror app</a>
    <p class="muted">
      Don't have the app yet?
      <a href="https://tryon-mirror.ai">Get it here.</a>
    </p>
  </div>
</body>
</html>
