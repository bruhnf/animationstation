# nginx config for the Tier A-Lean HA app instances (behind the Lightsail Load
# Balancer). See DEPLOYMENT.md §17. NOT used yet — staged for the HA migration.
#
# Differences from nginx.conf (the single-box prod config):
#   * Listens on :80 ONLY. TLS is terminated at the Lightsail Load Balancer (and
#     Cloudflare in front of it); the LB forwards plain HTTP to the instance. So
#     there are NO ssl_certificate / :443 / certbot blocks here.
#   * real-IP chain handles TWO proxy hops now: client → Cloudflare → LB →
#     nginx. We trust the Cloudflare ranges AND the Lightsail LB, and read the
#     true client IP from CF-Connecting-IP (Cloudflare sets it; the LB forwards
#     it). ⚠️ FILL IN the LB's source range at provisioning — see TODO below.
#   * The API server is `default_server` so the LB's health check (which hits the
#     instance by IP, not by Host) reaches /health/live.
# Everything security-critical is preserved: admin IP-allowlist, blocked-path
# 444s, rate-limit zones, CORS, the /t/ share proxy, /verified, /health.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # --- Real client IP through Cloudflare AND the Lightsail Load Balancer ---
    # Cloudflare edge ranges (keep in sync with nginx.conf / nginx.dev.conf):
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # TODO(HA migration): trust the Lightsail Load Balancer so the LB hop doesn't
    # mask the real client IP. The LB forwards from the instances' private subnet;
    # set this to that VPC/private CIDR (find via `aws lightsail get-instance
    # --instance-name tryon-app-1a` → privateIpAddress, and the regional private
    # range). Until this is correct, the admin IP-allowlist + fail2ban would key
    # on the LB's IP, so VERIFY before relying on them in the HA setup.
    set_real_ip_from 172.26.0.0/16; # PLACEHOLDER — replace with the real LB/VPC range
    # Cloudflare sets CF-Connecting-IP = the true visitor; the LB forwards it.
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html;

    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # Website (apex). Served over :80 — the LB/Cloudflare did the TLS.
    server {
        listen 80;
        server_name tryon-mirror.ai www.tryon-mirror.ai evofaceflow.com www.evofaceflow.com;
        root /var/www/website;
        index index.html;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # API server. `default_server` so the LB health check (by instance IP, no
    # matching Host) still reaches /health/live.
    server {
        listen 80 default_server;
        server_name api.tryon-mirror.ai api.evofaceflow.com _;

        limit_conn conn_limit 20;
        client_max_body_size 15M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        set $cors_origin "";
        set $cors_methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        set $cors_headers "Content-Type, Authorization, X-Correlation-Id, X-Admin-Key";
        if ($http_origin ~* "^https://(tryon-mirror\.ai|evofaceflow\.com)$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://localhost") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^exp://") {
            set $cors_origin $http_origin;
        }

        # Block common vuln-scan targets (drop the connection).
        location ~ \.(php|asp|aspx|jsp|cgi)$ {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }
        location ~* ^/(wp-|wordpress|wp-admin|wp-content|wp-includes|xmlrpc\.php) {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }
        location ~* ^/\.(env|git|svn|htaccess|htpasswd) {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }

        # Health (the LB health-checks /health/live through here).
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Admin dashboard — IP-allowlisted (defense-in-depth on the admin key).
        # Relies on the real-IP chain above resolving to the true client. KEEP IN
        # SYNC with nginx.conf and update on an admin-IP change.
        location = /admin {
            allow 47.230.244.171;
            allow 2603:7001:f0f0:ab90::/64;
            deny all;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location = /verified {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Public shareable try-on pages (OG meta) — backend-rendered.
        location /t/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/upload {
            limit_req zone=upload burst=5 nodelay;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/tryon {
            limit_req zone=general burst=20 nodelay;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 180s;
        }

        # Admin API — IP-allowlisted (keep in sync with `location = /admin`).
        location /api/admin {
            allow 47.230.244.171;
            allow 2603:7001:f0f0:ab90::/64;
            deny all;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=general burst=30 nodelay;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            return 404;
        }
    }
}
