# Dev nginx config — derived from nginx.conf.
#
# Differences from production nginx.conf:
#   - server_name is api-dev.tryon-mirror.ai + legacy api-dev.evofaceflow.com
#     (not api/www/the apex domains)
#   - SSL certs come from /etc/letsencrypt/live/api-dev.evofaceflow.com/
#     (cert lineage keeps its original name; it was --expand'ed to also cover
#     api-dev.tryon-mirror.ai — see DEPLOYMENT.md)
#   - The www-redirect and static-website server blocks are dropped — dev
#     only exposes the API + admin dashboard. (If you later want to serve the
#     marketing site from dev too, copy those blocks back from nginx.conf
#     and point them at a dev website domain.)
#
# Issue the cert before first `up` (HTTP-01 via the acme-challenge location):
#   sudo certbot certonly --webroot -w ./certbot/www \
#     -d api-dev.evofaceflow.com -d api-dev.tryon-mirror.ai

events {
    worker_connections 1024;
}

http {
    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # --- Cloudflare real client IP restoration ---
    # When a record is proxied (orange) through Cloudflare, the origin sees CF
    # edge IPs. Trust CF's published ranges and read the real client IP from the
    # CF-Connecting-IP header, so per-IP rate limiting, fail2ban, geo, and (on
    # prod) the admin IP-allowlist all key on the real visitor — not a CF IP.
    # Ranges from https://www.cloudflare.com/ips-v4 + /ips-v6 (refresh if CF
    # changes them). KEEP nginx.conf (prod) and nginx.dev.conf IN SYNC.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=notfound:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Map to track 404 responses and limit repeat offenders
    map $status $limit_key {
        404     $binary_remote_addr;
        default "";
    }
    limit_req_zone $limit_key zone=notfound_repeat:10m rate=1r/s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream backend
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # HTTP redirect to HTTPS (and ACME challenge for cert issuance/renewal)
    server {
        listen 80;
        server_name api-dev.tryon-mirror.ai api-dev.evofaceflow.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API server (api-dev.tryon-mirror.ai, legacy api-dev.evofaceflow.com)
    server {
        listen 443 ssl;
        http2 on;
        server_name api-dev.tryon-mirror.ai api-dev.evofaceflow.com;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/api-dev.evofaceflow.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-dev.evofaceflow.com/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Connection limits
        limit_conn conn_limit 20;

        # Client body size (for image uploads)
        client_max_body_size 15M;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # CORS configuration for web clients
        set $cors_origin "";
        set $cors_methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        set $cors_headers "Content-Type, Authorization, X-Correlation-Id, X-Admin-Key";

        # Allow requests from the main website (harmless on dev)
        if ($http_origin ~* "^https://(evofaceflow\.com|tryon-mirror\.ai)$") {
            set $cors_origin $http_origin;
        }
        # Also allow localhost for development
        if ($http_origin ~* "^http://localhost") {
            set $cors_origin $http_origin;
        }
        # Allow Expo dev client
        if ($http_origin ~* "^exp://") {
            set $cors_origin $http_origin;
        }

        # Block common vulnerability scan targets (PHP, WordPress, etc.)
        # Returns 444 (nginx drops connection without response)
        location ~ \.(php|asp|aspx|jsp|cgi)$ {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }

        location ~* ^/(wp-|wordpress|wp-admin|wp-content|wp-includes|xmlrpc\.php) {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }

        location ~* ^/\.(env|git|svn|htaccess|htpasswd) {
            access_log /var/log/nginx/blocked.log main;
            return 444;
        }

        # Health check endpoint (no rate limiting, no CORS needed)
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Admin dashboard (served by backend)
        location = /admin {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Email verification success page (served by backend). The verify
        # link redirects here after marking the account verified; without this
        # the catch-all `location /` below returns nginx's bare 404.
        location = /verified {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Public shareable try-on pages (server-rendered OG/Twitter meta). Served
        # by the backend; without this the catch-all `location /` below would
        # serve the static website index.html for /t/<jobId> and break previews.
        location /t/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Auth endpoints (strict rate limiting)
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Add CORS headers to actual response
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Upload endpoints (moderate rate limiting)
        location /api/upload {
            limit_req zone=upload burst=5 nodelay;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Add CORS headers to actual response
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Try-on POST (rate limited), GET (less restricted for polling)
        location /api/tryon {
            limit_req zone=general burst=20 nodelay;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Add CORS headers to actual response
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Longer timeout for AI generation
            proxy_read_timeout 180s;
        }

        # Admin endpoints
        location /api/admin {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=general burst=30 nodelay;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Add CORS headers to actual response
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Serve the website statically (mirrors prod's evofaceflow.com server
        # block) so web pages can be tested against the dev API. Same-origin
        # with /api here — note prod is CROSS-origin (evofaceflow.com →
        # api.evofaceflow.com), so CORS behavior must still be verified
        # separately (curl preflight or a dev website subdomain).
        # NOTE: no regex cache-header locations here on purpose — nginx regex
        # locations outrank the /api prefix locations above and could hijack
        # API paths; dev doesn't need cache headers.
        root /var/www/website;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
