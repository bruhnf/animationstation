version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: animationstation
      POSTGRES_PASSWORD: animationstation_dev
      POSTGRES_DB: animationstation_db
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://animationstation:animationstation_dev@postgres:5432/animationstation_db
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
      LOG_TO_FILE: 'true'
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/logs:/app/logs

volumes:
  postgres_data:
