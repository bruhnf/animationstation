<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="AnimationStation — discover AI images and videos created by the community. Imagine. Create. Transcend.">
  <title>AnimationStation | Discover AI Creations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/feed.css?v=20260709">
</head>
<body>
  <!-- Top banner -->
  <header class="feed-banner">
    <a href="/" class="nav-logo"><span class="logo-evo">Animation</span><span class="logo-face">Station</span></a>
    <nav class="banner-links banner-hide-sm">
      <a class="banner-link" href="/">Discover</a>
      <a class="banner-link" href="/create.html">Create</a>
      <a class="banner-link" href="/welcome.html">Get the App</a>
    </nav>
    <div class="banner-spacer"></div>
    <div class="banner-links" id="bannerRight"><!-- rendered by feed.js (auth-aware) --></div>
  </header>

  <!-- Immersive snap feed -->
  <main class="feed-scroll" id="feedScroll">
    <!-- posts inserted here before the sentinel -->
    <div id="feedEndSentinel" style="height:1px;"></div>
  </main>

  <!-- Slim footer (privacy / terms live here) -->
  <footer class="feed-footer">
    <a href="/privacy.html">Privacy</a>
    <span class="sep">·</span>
    <a href="/terms.html">Terms</a>
    <span class="sep">·</span>
    <a href="/welcome.html">About</a>
    <span class="sep">·</span>
    <span>© 2026 AnimationStation</span>
  </footer>

  <!-- Comments bottom sheet -->
  <div class="overlay hidden" id="commentsOverlay" onclick="if(event.target===this)Feed.closeComments()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-head">
        <h3>Comments</h3>
        <button class="sheet-close" onclick="Feed.closeComments()" aria-label="Close">&times;</button>
      </div>
      <div class="sheet-body" id="commentsBody"></div>
      <div class="hidden" id="replyHint" style="padding:.35rem 1rem;font-size:.82rem;color:var(--text-2);display:flex;justify-content:space-between;align-items:center;">
        <span></span>
        <button class="sheet-close" style="font-size:1.1rem" onclick="Feed.cancelReply()" title="Cancel reply">&times;</button>
      </div>
      <div class="sheet-input">
        <textarea id="commentInput" placeholder="Add a comment…" maxlength="500" rows="1"></textarea>
        <button class="sheet-send" id="commentSend" onclick="Feed.postComment()" title="Post" aria-label="Post comment">&#8593;</button>
      </div>
    </div>
  </div>

  <!-- Search panel -->
  <div class="overlay hidden" id="searchOverlay" onclick="if(event.target===this)Feed.closeSearch()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-head">
        <button class="sheet-close" onclick="Feed.closeSearch()" aria-label="Close">&larr;</button>
        <input class="search-input" id="searchInput" type="search" placeholder="Search people…" oninput="Feed.onSearchInput()" autocomplete="off">
      </div>
      <div class="panel-body" id="searchResults"></div>
    </div>
  </div>

  <!-- Profile panel -->
  <div class="overlay hidden" id="profileOverlay" onclick="if(event.target===this)Feed.closeProfile()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-head">
        <button class="sheet-close" onclick="Feed.closeProfile()" aria-label="Close">&larr;</button>
        <h3>Profile</h3>
      </div>
      <div class="panel-body" id="profileBody"></div>
    </div>
  </div>

  <!-- Full-screen media viewer -->
  <div class="viewer hidden" id="mediaViewer" onclick="if(event.target===this)Feed.closeViewer()">
    <button class="viewer-close" onclick="Feed.closeViewer()" aria-label="Close">&times;</button>
    <div id="viewerInner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ?v= cache-buster: bump when these files change. -->
  <script src="/js/auth.js?v=20260703"></script>
  <script src="/js/feed.js?v=20260703b"></script>
</body>
</html>
