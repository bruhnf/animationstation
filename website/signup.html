<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your TryOn Mirror account">
  <title>Sign Up | TryOn Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="nav-logo" style="font-size: 1.75rem;">
          <span class="logo-evo">TryOn</span><span class="logo-face">&nbsp;Mirror</span>
        </a>
        <h1>Create an account</h1>
        <p>Join TryOn Mirror today</p>
      </div>
      
      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>
      
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com" 
            required
            autocomplete="email"
          >
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required
            autocomplete="new-password"
            minlength="8"
          >
          <small style="color: var(--color-gray-500); display: block; margin-top: 0.25rem;">
            At least 8 characters
          </small>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="••••••••" 
            required
            autocomplete="new-password"
          >
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">
          Create Account
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="/login.html">Log in</a></p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    // Check if already logged in
    if (checkAuthState()) {
      window.location.href = '/';
    }
    
    async function handleSignup(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      hideError();
      hideSuccess();

      // Validate passwords match
      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        await signup(email, password);
        
        // Show success message
        document.getElementById('signupForm').style.display = 'none';
        showSuccess(`
          <strong>Account created!</strong><br><br>
          We've sent a verification email to <strong>${email}</strong>.<br><br>
          Please check your inbox and click the verification link to activate your account.
        `);
        
        // Add link to login page
        document.querySelector('.auth-footer').innerHTML = `
          <p>Already verified? <a href="/login.html">Log in</a></p>
        `;
      } catch (err) {
        showError(err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    }
    
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.innerHTML = msg;
      el.classList.add('visible');
    }
    
    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.innerHTML = msg;
      el.classList.add('visible');
    }
    
    function hideSuccess() {
      document.getElementById('successMsg').classList.remove('visible');
    }
  </script>
</body>
</html>
