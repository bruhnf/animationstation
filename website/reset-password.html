<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your AnimationStation password">
  <meta name="robots" content="noindex">
  <title>Reset Password | AnimationStation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="nav-logo" style="font-size: 1.75rem;">
          <span class="logo-evo">Animation</span><span class="logo-face">Station</span>
        </a>
        <h1 id="pageTitle">Reset your password</h1>
        <p id="pageSubtitle">Choose a new password for your account</p>
      </div>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <!-- Mode 1: token present — set a new password -->
      <form id="resetForm" onsubmit="handleReset(event)" style="display:none;">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
                 required autocomplete="new-password" minlength="8">
          <small style="color:#888; display:block; margin-top:.35rem;">
            At least 8 characters, with an uppercase letter, a number, and a symbol.
          </small>
        </div>
        <div class="form-group">
          <label for="passwordConfirm">Confirm new password</label>
          <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="••••••••"
                 required autocomplete="new-password" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn">Set New Password</button>
      </form>

      <!-- Mode 2: no/expired token — request a reset link -->
      <form id="requestForm" onsubmit="handleRequest(event)" style="display:none;">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
                 required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" id="requestBtn">Email Me a Reset Link</button>
      </form>

      <!-- Success state after a reset -->
      <div id="doneBox" style="display:none; text-align:center;">
        <p style="margin:1rem 0;">You can now log in with your new password.</p>
        <a class="btn btn-primary" href="/login.html" style="display:inline-block; margin-bottom:.6rem;">Log in on the web</a>
        <p style="color:#888; font-size:.9rem;">Using the iPhone app? Just open it and log in.</p>
      </div>

      <div class="auth-footer">
        <p><a href="/login.html">Back to log in</a></p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    var token = new URLSearchParams(window.location.search).get('token') || '';

    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.innerHTML = msg;
      el.classList.add('visible');
    }
    function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
    function showSuccess(msg) {
      var el = document.getElementById('successMsg');
      el.innerHTML = msg;
      el.classList.add('visible');
    }

    // Pick the mode: with a token we set a password; without one we offer to
    // send the email (this page doubles as the "Forgot password?" page).
    if (token) {
      show('resetForm');
    } else {
      document.getElementById('pageTitle').textContent = 'Forgot your password?';
      document.getElementById('pageSubtitle').textContent =
        "Enter your email and we'll send you a reset link";
      show('requestForm');
    }

    async function handleReset(e) {
      e.preventDefault();
      hideError();
      var pw = document.getElementById('password').value;
      var pw2 = document.getElementById('passwordConfirm').value;
      if (pw !== pw2) { showError('Passwords do not match.'); return; }
      if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw) || !/[^A-Za-z0-9]/.test(pw)) {
        showError('Password must be at least 8 characters and include an uppercase letter, a number, and a symbol.');
        return;
      }
      var btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        var res = await fetch(API_BASE + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: pw }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) throw new Error(data.error || 'Could not reset your password.');
        hide('resetForm');
        showSuccess('Password updated successfully.');
        show('doneBox');
      } catch (err) {
        // An invalid/expired token is recoverable — offer the request form.
        showError((err.message || 'Could not reset your password.') +
          ' You can request a fresh link below.');
        hide('resetForm');
        show('requestForm');
        btn.disabled = false; btn.textContent = 'Set New Password';
      }
    }

    async function handleRequest(e) {
      e.preventDefault();
      hideError();
      var btn = document.getElementById('requestBtn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        await fetch(API_BASE + '/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        // Same response either way — the endpoint deliberately doesn't reveal
        // whether the email exists.
        showSuccess('If an account exists for that email, a reset link is on its way. Check your inbox.');
        hide('requestForm');
      } catch (err) {
        showError('Could not send the reset email. Please try again.');
        btn.disabled = false; btn.textContent = 'Email Me a Reset Link';
      }
    }
  </script>
</body>
</html>
