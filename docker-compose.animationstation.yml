# ─────────────────────────────────────────────────────────────────────────────
# AnimationStation — dev/test stack for the shared bruhnfreeman-com Lightsail box
# (3.223.180.176). That box already runs other apps behind a single Caddy reverse
# proxy (container "caddy" on the external "web" network, which owns :80/:443 and
# provisions TLS automatically via Let's Encrypt).
#
# This stack therefore runs ONLY its own datastore + backend — NO nginx, NO
# fail2ban, NO alloy (unlike TryOn's docker-compose.prod.yml). The backend joins
# the pre-existing "web" network so Caddy can reach it by name
# (animationstation-api:3000); everything else stays on a private internal net.
# Add the matching Caddy site block from deploy/animationstation.Caddyfile.snippet.
#
# Bring up:   docker compose -f docker-compose.animationstation.yml up -d --build
# Migrate:    docker compose -f docker-compose.animationstation.yml exec animationstation-api npx prisma migrate deploy
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:15-alpine
    container_name: animationstation-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - animationstation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: animationstation-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - animationstation_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      target: prod
    container_name: animationstation-api
    restart: always
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      LOG_DIR: /var/log/animationstation
      NODE_OPTIONS: --max-old-space-size=768
    volumes:
      - backend_logs:/var/log/animationstation
      - ./backend/splash:/app/splash
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - web # shared external proxy network — Caddy reaches this by container name
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  animationstation_postgres_data:
  animationstation_redis_data:
  backend_logs:

networks:
  internal:
    driver: bridge
  # Pre-existing network created by the box's Caddy proxy stack. Declared
  # external so this compose attaches to it instead of creating a new one.
  web:
    external: true
