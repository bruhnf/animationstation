# ─────────────────────────────────────────────────────────────────────────────
# AnimationStation — DEV stack (Lightsail box 54.173.136.56).
# The box's shared nginx (from the co-hosted app's stack) owns :80/:443 and
# terminates TLS for dev.animationstation.ai; it reaches this backend by container
# name over the external "apps" network. This stack runs ONLY its own
# datastore + backend — no proxy containers of its own.
#
# Bring up:   docker compose -f docker-compose.dev.yml up -d --build
# Migrate:    docker compose -f docker-compose.dev.yml exec backend npx prisma migrate deploy
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:15-alpine
    container_name: animationstation-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - animationstation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: animationstation-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - animationstation_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      target: prod
    container_name: animationstation-api
    restart: always
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      LOG_DIR: /var/log/animationstation
      NODE_OPTIONS: --max-old-space-size=768
    volumes:
      - backend_logs:/var/log/animationstation
      - ./backend/splash:/app/splash
      # Marketing + account website, served by the backend at the site root.
      # Bind-mounted (not baked into the image) so site edits deploy without a
      # backend rebuild — just git pull and restart the container.
      - ./website:/app/website:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - apps # shared external proxy network — the box's nginx reaches this by container name
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  animationstation_postgres_data:
  animationstation_redis_data:
  backend_logs:

networks:
  internal:
    driver: bridge
  # Shared reverse-proxy network on the box (created once: docker network create apps).
  # The co-hosted app's nginx container also joins it and proxies
  # dev.animationstation.ai → animationstation-api:3000.
  apps:
    external: true
