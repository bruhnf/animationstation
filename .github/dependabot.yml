# Weekly dependency-update PRs. Kept low-volume on purpose: grouped minor/patch
# bumps, small PR cap. Majors arrive individually so they get real review.
# NOTE: Expo-managed packages (expo-*, react-native) should be bumped with
# `npx expo install` to stay SDK-compatible — treat Dependabot PRs touching
# those as a prompt to run that instead of merging blindly.
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
