# Weekly dependency-update PRs. Kept low-volume on purpose: grouped minor/patch
# bumps, small PR cap. Majors arrive individually so they get real review.
# NOTE: Expo-managed packages (expo-*, react-native) should be bumped with
# `npx expo install` to stay SDK-compatible — treat Dependabot PRs touching
# those as a prompt to run that instead of merging blindly.
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]
    # Expo-SDK-managed packages: versions are dictated by the pinned Expo SDK
    # (currently 54 — see E:\Projects\CLAUDE.md), NOT by npm's latest. They only
    # move when the SDK is upgraded deliberately, via `npx expo install`.
    # Dependabot once proposed react-native 0.81->0.86 as "minor" (#3) and
    # expo-* 57.0.0 (#5, #6) — all SDK 57 packages that break Expo Go SDK 54.
    ignore:
      - dependency-name: expo
      - dependency-name: expo-*
      - dependency-name: "@expo/*"
      - dependency-name: babel-preset-expo
      - dependency-name: jest-expo
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: react-native
      - dependency-name: react-native-*
      - dependency-name: "@react-native/*"
      - dependency-name: "@react-native-*"
      - dependency-name: "@types/react"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
